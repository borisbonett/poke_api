<div class="container py-4 min-vh-100 d-flex flex-column">
    <h1 class="mb-5 text-center fw-bold">Pokédex</h1>

    @if (isLoading()) {
    <div class="flex-grow-1 d-flex justify-content-center align-items-center">
        <div class="spinner-border text-primary" style="width: 4rem; height: 4rem;" role="status">
            <span class="visually-hidden">Cargando...</span>
        </div>
    </div>
    } @else {
    <!-- Cambiado a max 3 columnas para hacer tarjetas más grandes -->
    <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-5">
        @for (pokemon of pokemons(); track pokemon.id) {
        <div class="col">
            <!-- Tarjeta Dark suave -->
            <div class="card h-100 shadow border-secondary rounded-4 overflow-hidden bg-dark text-light">
                <div class="text-center p-4 d-flex justify-content-center align-items-center"
                    style="background-color: rgba(255,255,255,0.05); min-height: 250px;">
                    <img [src]="pokemon.sprites.other['official-artwork'].front_default || pokemon.sprites.front_default"
                        class="img-fluid" style="max-height: 200px; filter: drop-shadow(0px 8px 8px rgba(0,0,0,0.5));"
                        [alt]="pokemon.name">
                </div>
                <div class="card-body text-center p-4">
                    <h5 class="card-title text-capitalize fw-bold mb-4 fs-3">{{ pokemon.name }}</h5>
                    <div class="d-flex justify-content-center flex-wrap gap-2">
                        @for (typeInfo of pokemon.types; track typeInfo.type.name) {
                        <!-- Color dinámico del tipo -->
                        <span
                            class="badge rounded-pill px-4 py-2 fs-6 text-capitalize text-white shadow-sm border border-light border-opacity-25"
                            [style.backgroundColor]="getTypeColor(typeInfo.type.name)">
                            {{ typeInfo.type.name }}
                        </span>
                        }
                    </div>
                </div>
            </div>
        </div>
        }
    </div>

    <!-- Paginador -->
    <div class="d-flex justify-content-center align-items-center mt-5 gap-4 mt-auto pt-4">
        <button class="btn btn-custom-dark px-4 py-2 rounded-pill fw-bold" (click)="prevPage()"
            [disabled]="offset() === 0">
            &laquo; Anterior
        </button>
        <span class="fw-bold fs-4 text-secondary">
            Página {{ (offset() / limit) + 1 }}
        </span>
        <button class="btn btn-custom-dark px-4 py-2 rounded-pill fw-bold" (click)="nextPage()">
            Siguiente &raquo;
        </button>
    </div>
    }
</div>
